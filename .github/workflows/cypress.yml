name: Cypress E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress:
    name: Cypress (SauceDemo)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rodar Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome

      - name: Publicar screenshots em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7
